name: Dependency maintenance

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  npm-audit-fix:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: ybiquitous/npm-audit-fix-action@v7
      with:
        assignees: EvanK
